services:
  app:
    build:
      context: ./frontend
      dockerfile: dev.Dockerfile
    ports:
      - 5173:5173
    container_name: frontend-dev

  backend:
    build:
      context: ./backend
      dockerfile: dev.Dockerfile
    depends_on:
      - mongo

  mongo:
    image: mongo
    ports:
      - 3456:27017

  nginx:
    image: nginx:1.29
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    depends_on:
      - app
      - backend