services:
  frontend:
    image: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/usr/src/app/dist  

  mongo:
    image: mongo

  backend:
    image: backend
    env_file:
    - ./backend/.env
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
    - mongo

  nginx:
    image: nginx:1.29
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro 
    ports:
      - "8080:80"
    container_name: reverse-proxy
    depends_on:
      - backend
      - frontend

volumes:
  frontend_dist: